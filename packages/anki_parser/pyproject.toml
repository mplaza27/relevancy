[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anki-parser"
version = "0.1.0"
description = "Standalone read-only parser for Anki .apkg files"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "zstandard>=0.22.0",
    "selectolax>=0.3.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/anki_parser"]
